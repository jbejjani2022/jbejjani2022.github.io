<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'American Typewriter', 'Special Elite', cursive;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 680px;
      width: 90%;
      text-align: center;
      padding: 3rem 1rem;
    }

    @media (max-width: 480px) {
      #invite-text {
        font-size: 1.1rem;
      }
      .rsvp-btn {
        font-size: 1.1rem;
      }
    }

    .logo {
      margin-bottom: 2rem;
    }

    .logo img {
      width: 120px;
      height: auto;
    }

    .logo a {
      display: inline-block;
    }

    #invite-text {
      font-size: 1.25rem;
      line-height: 1.8;
      text-align: left;
    }

    #invite-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #111;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .rsvp-options {
      margin-top: 2rem;
      opacity: 0;
      transition: opacity 0.6s ease-in;
    }

    .rsvp-options.visible {
      opacity: 1;
    }

    .rsvp-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      font-family: 'American Typewriter', 'Special Elite', cursive;
      font-size: 1.25rem;
      font-weight: normal;
      font-style: italic;
      color: #111;
      cursor: pointer;
      padding: 0.75rem 0;
      text-align: left;
    }

    .rsvp-btn:hover {
      text-decoration: underline;
    }

    .confirmation {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.6s ease-in;
    }

    .confirmation.visible {
      opacity: 1;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      padding: 2rem;
      max-width: 440px;
      width: 90%;
      text-align: left;
    }

    .modal p {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .modal input[type="text"] {
      width: 100%;
      font-family: 'American Typewriter', 'Special Elite', cursive;
      font-size: 1rem;
      border: 1px solid #999;
      padding: 0.6rem;
      margin-bottom: 1.25rem;
    }

    .modal input[type="text"]:focus {
      outline: none;
      border-color: #111;
    }

    .modal button {
      font-family: 'American Typewriter', 'Special Elite', cursive;
      font-size: 1.1rem;
      font-weight: normal;
      font-style: italic;
      background: none;
      border: none;
      cursor: pointer;
      color: #111;
      padding: 0.5rem 0;
    }

    .modal button:hover {
      text-decoration: underline;
    }

    /* Envelope */
    .envelope-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }

    .envelope-container {
      position: relative;
      width: 340px;
      height: 240px;
      perspective: 800px;
    }

    .envelope-body {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 170px;
      background: #faf6f0;
      border: 2px solid #c9b99a;
      border-radius: 0 0 4px 4px;
      z-index: 2;
      overflow: hidden;
    }

    .envelope-flap {
      position: absolute;
      top: 68px;
      left: 0;
      width: 100%;
      height: 0;
      z-index: 3;
      transform-origin: top center;
      transform-style: preserve-3d;
    }

    .envelope-flap-shape {
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 120px solid #f5efe6;
      filter: drop-shadow(0 1px 0 #c9b99a);
      position: relative;
    }

    .envelope-flap-shape::after {
      content: '';
      position: absolute;
      top: -120px;
      left: -170px;
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 120px solid transparent;
      border-top-color: transparent;
    }

    .envelope-flap-border {
      position: absolute;
      top: 68px;
      left: -1px;
      width: 0;
      height: 0;
      border-left: 171px solid transparent;
      border-right: 171px solid transparent;
      border-top: 121px solid #c9b99a;
      z-index: 2;
      transform-origin: top center;
      pointer-events: none;
    }

    .envelope-inner-flap {
      position: absolute;
      top: 70px;
      left: 0;
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-bottom: 110px solid #f0e8da;
      z-index: 1;
    }

    .letter {
      position: absolute;
      bottom: 4px;
      left: 10px;
      right: 10px;
      height: 150px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 2px;
      z-index: 1;
      transform: translateY(0);
    }

    .seal {
      position: absolute;
      top: 180px;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }

    .seal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .envelope-container:hover .seal {
      transform: translate(-50%, -50%) scale(1.08);
    }

    .envelope-tap-text {
      margin-top: 1.5rem;
      font-size: 1.15rem;
      font-style: italic;
    }

    .envelope-wrap:hover .envelope-tap-text {
      text-decoration: underline;
    }

    /* Envelope opening animation */
    .envelope-container.opening .envelope-flap {
      animation: flapOpen 0.6s ease-in forwards;
    }

    .envelope-container.opening .envelope-flap-border {
      animation: flapOpen 0.6s ease-in forwards;
    }

    .envelope-container.opening .seal {
      animation: sealFade 0.4s ease-out 0.25s forwards;
    }

    .envelope-container.opening .letter {
      animation: letterRise 0.7s ease-out 0.55s forwards;
    }

    .envelope-container.opening .envelope-body,
    .envelope-container.opening .envelope-inner-flap {
      animation: envelopeFade 0.4s ease-out 1.1s forwards;
    }

    @keyframes flapOpen {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-180deg); }
    }

    @keyframes sealFade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    }

    @keyframes letterRise {
      0% { transform: translateY(0); }
      100% { transform: translateY(-160px); opacity: 0; }
    }

    @keyframes envelopeFade {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.95); }
    }

    #start-prompt {
      transition: opacity 0.3s ease-out;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .envelope-container {
        width: 280px;
        height: 200px;
      }
      .envelope-body {
        height: 140px;
      }
      .envelope-flap {
        top: 58px;
      }
      .envelope-flap-shape {
        border-left-width: 140px;
        border-right-width: 140px;
        border-top-width: 100px;
      }
      .envelope-flap-border {
        top: 58px;
        border-left-width: 141px;
        border-right-width: 141px;
        border-top-width: 101px;
      }
      .envelope-inner-flap {
        top: 60px;
        border-left-width: 140px;
        border-right-width: 140px;
        border-bottom-width: 90px;
      }
      .letter {
        height: 120px;
      }
      .seal {
        top: 150px;
        width: 54px;
        height: 54px;
      }
    }

    /* 404 */
    .not-found {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.1rem;
      color: #666;
    }

    .not-found h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 404 content (shown by default) -->
    <div id="not-found" class="not-found">
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist.</p>
    </div>

    <!-- Click to begin -->
    <div id="start-prompt" style="display: none; cursor: pointer;">
      <div class="envelope-wrap">
        <div class="envelope-container" id="envelope">
          <div class="envelope-flap">
            <div class="envelope-flap-shape"></div>
          </div>
          <div class="envelope-flap-border"></div>
          <div class="envelope-inner-flap"></div>
          <div class="envelope-body">
            <div class="letter"></div>
          </div>
          <div class="seal">
            <img src="/assets/images/chef_alex_b_logo.png" alt="Chef Alex B">
          </div>
        </div>
        <p class="envelope-tap-text">Click to open your invitation.</p>
      </div>
    </div>

    <!-- Invite content (hidden by default) -->
    <div id="invite" style="display: none;">
      <div class="logo">
        <a href="https://www.instagram.com/chef_alex_b/" target="_blank" rel="noopener noreferrer">
          <img src="/assets/images/chef_alex_b_logo.png" alt="Chef Alex B">
        </a>
      </div>

      <div id="invite-text"></div>

      <div id="confirmation" class="confirmation"></div>

      <div id="rsvp-options" class="rsvp-options">
        <button class="rsvp-btn" id="btn-attend">I will attend.</button>
        <button class="rsvp-btn" id="btn-decline">I won't attend.</button>
      </div>
    </div>

    <!-- Dietary restrictions modal -->
    <div id="modal" class="modal-overlay">
      <div class="modal">
        <p>Any dietary restrictions?</p>
        <input type="text" id="dietary-input" placeholder="e.g. vegetarian, nut allergy...">
        <button id="btn-confirm">Confirm</button>
      </div>
    </div>

    <!-- Decline confirmation modal -->
    <div id="decline-modal" class="modal-overlay">
      <div class="modal">
        <p>Confirm that you won't be attending?</p>
        <button id="btn-decline-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // Invitee data injected by Jekyll
    const ALLOWED = {
      {% for person in site.data.invitees %}"{{ person.slug }}": "{{ person.first }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    };

    // Thocky mechanical keyboard sound via Web Audio API
    let audioCtx;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    let charCount = 0;
    function typeSound() {
      if (!audioCtx || audioCtx.state !== 'running') return;
      charCount++;
      // Only click every 3rd character — less frequent, more deliberate
      if (charCount % 3 !== 0) return;

      const now = audioCtx.currentTime;

      // Randomize per-keystroke for realism
      const volume = 0.13 + Math.random() * 0.05;

      // Layer 1: Hard click impact — unfiltered noise with very fast decay
      const impactLen = Math.floor(audioCtx.sampleRate * 0.004);
      const impactBuf = audioCtx.createBuffer(1, impactLen, audioCtx.sampleRate);
      const impactData = impactBuf.getChannelData(0);
      for (let i = 0; i < impactLen; i++) {
        impactData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (impactLen * 0.08));
      }
      const impactSrc = audioCtx.createBufferSource();
      impactSrc.buffer = impactBuf;

      // High-pass to keep it snappy, remove muddiness
      const impactHP = audioCtx.createBiquadFilter();
      impactHP.type = 'highpass';
      impactHP.frequency.value = 2000;

      const impactGain = audioCtx.createGain();
      impactGain.gain.setValueAtTime(volume * 2.5, now);
      impactGain.gain.exponentialRampToValueAtTime(0.001, now + 0.008);

      impactSrc.connect(impactHP);
      impactHP.connect(impactGain);
      impactGain.connect(audioCtx.destination);
      impactSrc.start(now);

      // Layer 2: Mid-range click body — bandpass filtered noise
      const clickFreq = 1800 + Math.random() * 800;
      const clickLen = Math.floor(audioCtx.sampleRate * 0.015);
      const clickBuf = audioCtx.createBuffer(1, clickLen, audioCtx.sampleRate);
      const clickData = clickBuf.getChannelData(0);
      for (let i = 0; i < clickLen; i++) {
        clickData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (clickLen * 0.12));
      }
      const clickSrc = audioCtx.createBufferSource();
      clickSrc.buffer = clickBuf;

      const clickBP = audioCtx.createBiquadFilter();
      clickBP.type = 'bandpass';
      clickBP.frequency.value = clickFreq;
      clickBP.Q.value = 3;

      const clickGain = audioCtx.createGain();
      clickGain.gain.setValueAtTime(volume * 1.8, now);
      clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);

      clickSrc.connect(clickBP);
      clickBP.connect(clickGain);
      clickGain.connect(audioCtx.destination);
      clickSrc.start(now);

      // Layer 3: Low thock body — gives it the satisfying bottom end
      const pitch = 100 + Math.random() * 50;
      const thock = audioCtx.createOscillator();
      thock.type = 'sine';
      thock.frequency.setValueAtTime(pitch, now);
      thock.frequency.exponentialRampToValueAtTime(pitch * 0.4, now + 0.06);

      const thockGain = audioCtx.createGain();
      thockGain.gain.setValueAtTime(volume * 0.7, now);
      thockGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);

      thock.connect(thockGain);
      thockGain.connect(audioCtx.destination);
      thock.start(now);
      thock.stop(now + 0.06);
    }
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztQB8uLjtnPEK35ZvIvgEAumxtqmfsy0sVfyOF4srEzIkveYPCv3yWY1mtBySFtsXCPg/exec';

    // Check URL
    const match = window.location.pathname.match(/^\/3-1-26-([a-z]+)\/?$/);
    const slug = match ? match[1] : null;
    const guestName = slug ? ALLOWED[slug] : null;

    if (guestName) {
      document.getElementById('not-found').style.display = 'none';
      document.getElementById('start-prompt').style.display = 'block';

      document.getElementById('start-prompt').addEventListener('click', () => {
        initAudio();
        const envelope = document.getElementById('envelope');
        if (envelope.classList.contains('opening')) return;
        envelope.classList.add('opening');
        setTimeout(() => {
          document.getElementById('start-prompt').style.display = 'none';
          document.getElementById('invite').style.display = 'block';
          startInvite(guestName);
        }, 1500);
      });
    }

    function startInvite(name) {
      const lines = [
        `Hi, ${name}!`,
        ``,
        `We'd love you to join us on Sunday, March 1st at 7:30pm for DINNER prepared by Chef Alex B.`,
        ``,
        `It'll be three courses of flavor acrobatics, in Prescott 20A-26.`,
        ``,
        `To cover the cost of ingredients and wine, we will ask for a ticket of $40 per person.`,
        ``,
        `We hope to have you there!`
      ];

      const fullText = lines.join('\n');
      const textEl = document.getElementById('invite-text');
      let i = 0;

      function type() {
        if (i < fullText.length) {
          const char = fullText[i];
          if (char === '\n') {
            textEl.innerHTML += '<br>';
          } else {
            textEl.innerHTML += char;
            if (char !== ' ') typeSound();
          }
          i++;
          window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
          const delay = char === '.' || char === ',' ? 80 : 30;
          setTimeout(type, delay);
        } else {
          // Remove cursor, show RSVP
          document.getElementById('rsvp-options').classList.add('visible');
        }
      }

      // Add blinking cursor
      textEl.innerHTML = '<span class="cursor"></span>';
      setTimeout(() => {
        textEl.innerHTML = '';
        type();
      }, 600);
    }

    // Close modals when clicking outside
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.classList.remove('active');
      });
    });

    // RSVP handlers
    document.getElementById('btn-attend').addEventListener('click', () => {
      document.getElementById('modal').classList.add('active');
      document.getElementById('dietary-input').focus();
    });

    document.getElementById('btn-decline').addEventListener('click', () => {
      document.getElementById('decline-modal').classList.add('active');
    });

    document.getElementById('btn-decline-confirm').addEventListener('click', async () => {
      document.getElementById('decline-modal').classList.remove('active');
      await submitRSVP(guestName, 'No', '');
      showConfirmation();
    });

    document.getElementById('btn-confirm').addEventListener('click', async () => {
      const dietary = document.getElementById('dietary-input').value.trim();
      document.getElementById('modal').classList.remove('active');
      await submitRSVP(guestName, 'Yes', dietary);
      showConfirmation();
    });

    async function submitRSVP(name, response, dietaryRestrictions) {
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: new URLSearchParams({
            name: name,
            response: response,
            dietary_restrictions: dietaryRestrictions,
            timestamp: new Date().toISOString()
          }),
          mode: 'no-cors'
        });
      } catch (e) {
        // no-cors won't give us a readable response, but the request still goes through
      }
    }

    function showConfirmation() {
      const el = document.getElementById('confirmation');
      el.textContent = "Response confirmed! Feel free to change it before Thursday.";
      el.classList.add('visible');
    }
  </script>
</body>
</html>
